    <!-- JSON-LD Schema Hotel & Event -->
    <script type="application/ld+json">
      [{
        "@context": "https://schema.org",
        "@type": "Hotel",
        "name": "Cabañas del Volcán",
        "description": "Hospedaje ecológico premium con vistas al Volcán de Fuego en Colima, México.",
        "url": "https://www.cabanasdelvolcan.mx/",
        "telephone": "+523121500516",
        "petsAllowed": "True",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "MX",
          "addressRegion": "Colima"
        },
        "containsPlace": [
          {
            "@type": "Accommodation",
            "name": "Casa de Campo Volcán",
            "description": "Hospedaje premium de montaña con las mejores vistas al Volcán de Fuego."
          },
          {
            "@type": "Accommodation",
            "name": "Cabaña Santa Helena",
            "description": "Cabaña sostenible y familiar ideal para turismo de naturaleza."
          },
          {
            "@type": "Accommodation",
            "name": "Monte Etna",
            "description": "Cabaña rústica de madera y bambú para grupos de aventura."
          },
          {
            "@type": "Accommodation",
            "name": "Refugio Krakatoa",
            "description": "Glamping de piedra y ecoturismo para desconexión total."
          }
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "Event",
        "name": "Tour X Volcán",
        "description": "Experiencias de ecoturismo extremo: tirolesas, senderismo y caminatas al coloso.",
        "url": "https://www.cabanasdelvolcan.mx/#experiencias"
      }]
    </script>
